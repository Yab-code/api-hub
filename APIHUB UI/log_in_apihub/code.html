<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>APIHub - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "inverse-primary": "#c3c0ff",
                        "secondary": "#565e74",

                        "inverse-on-surface": "#eaf1ff",
                        "surface-bright": "#f8f9ff",
                        "on-secondary-fixed": "#131b2e",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-container": "#5c647a",

                        "error": "#ba1a1a",

                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"

                    "spacing": {
                        "base": "4px",
                        "sm": "8px",
                        "container-max": "1280px",
                        "lg": "24px",
                        "xs": "4px",

                        "gutter": "24px",

                    "fontFamily": {

                        "headline-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}]

                }
            }

<style>
        body {
            background-image: radial-gradient(#dae2fd 1px, transparent 1px);
            background-size: 24px 24px;
            background-color: #f8f9ff;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-md sm:p-lg text-on-background antialiased">
<!-- Auth Container -->
<main class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-2xl shadow-[0_4px_12px_rgba(0,0,0,0.03)] overflow-hidden">
<div class="p-lg sm:p-xl flex flex-col gap-xl">
<!-- Header Section -->
<header class="text-center flex flex-col gap-sm items-center">
<div class="w-12 h-12 bg-primary-container text-on-primary rounded-xl flex items-center justify-center mb-sm shadow-sm">
<span class="material-symbols-outlined" data-icon="api" style="font-variation-settings: 'FILL' 1; font-size: 28px;">api</span>
</div>
<h1 class="font-headline-md text-headline-md text-on-background">Welcome back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Log in to your APIHub dashboard</p>
</header>
<!-- Social Login Options -->
<div class="flex flex-col gap-sm">
<button class="w-full h-12 flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-sm text-body-sm font-semibold text-on-background hover:bg-surface-container-low hover:border-primary-container transition-all duration-200">
<img alt="GitHub Logo" class="w-5 h-5 opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAxDiITk2atpJSVRDJnPctVfg6p7Arz6FQVkt5B046cA-uhGtIBeAgtG9cAnGGtWkQHmO60JRWxsFhf3379LO7Ka0Nh4QFP0IA_e8npFUz-UlpHQY_BWQeusI-yePqwHa9F0DT0x5JGHUAh7TB-c3KUzMiiXSzuQ9HzoccfTDNEkfHCHddgLOQPq2D1Zc9DtP51Bq2UB9SAvqUcBzvK-Tw-0BiF6887JOVBMEsTAFIN_M50il6P9kzN1_nqUM2yatTdNfDNci1nJNe4"/>
                    Sign in with GitHub
                </button>
<button class="w-full h-12 flex items-center justify-center gap-sm bg-surface-container-lowest border border-outline-variant rounded-lg font-body-sm text-body-sm font-semibold text-on-background hover:bg-surface-container-low hover:border-primary-container transition-all duration-200">
<img alt="Google Logo" class="w-4 h-4 opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDE6X172obGceYuO3T1RJwmS0CbjAim2wLhuvitdyt9XeMD3jseHk47kXRdeK9kRR5iBFrZKR78d6XY6H5mcSjm064BiLd0F-3XNALYSC5obKBvq3j4fR8UVXwfdwOV8DFj_mqXiZ3m6bszLPs7xE-YR5tBZkBCB58VX_1BAQefn54N2tDjD8G9QoeKPnF5YtNNxCGRcHp4g_hiDorST0GBAGjLso0DWS5fCrQVIh3ccNro0C7pz3iiIF7o7J65F1iB12zPA4OuaoXu"/>
                    Sign in with Google
                </button>
</div>
<!-- Divider -->
<div class="relative flex items-center py-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-label-caps text-label-caps text-on-surface-variant bg-surface-container-lowest px-2">OR CONTINUE WITH EMAIL</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Email Form -->
<form action="#" class="flex flex-col gap-lg" method="POST">
<div class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-body-sm text-body-sm font-semibold text-on-background" for="email">Email address</label>
<input class="w-full h-12 px-sm py-2 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-background placeholder:text-outline focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all outline-none" id="email" name="email" placeholder="developer@company.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-body-sm text-body-sm font-semibold text-on-background" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary hover:text-primary-container font-semibold transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-sm py-2 pr-12 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-background placeholder:text-outline focus:ring-2 focus:ring-primary-container focus:border-transparent transition-all outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 px-3 flex items-center text-outline hover:text-on-surface-variant focus:outline-none" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary-container focus:ring-primary-container bg-surface" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-sm text-body-sm text-on-surface-variant" for="remember-me">
                        Remember me for 30 days
                    </label>
</div>
<!-- Submit Button -->
<button class="w-full h-12 bg-primary-container hover:bg-surface-tint text-on-primary rounded-lg font-body-md text-body-md font-semibold transition-colors duration-200 shadow-sm flex justify-center items-center gap-xs" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer -->
<div class="bg-surface-container-low px-lg py-md border-t border-outline-variant text-center">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                Don't have an account? 
                <a class="font-semibold text-primary hover:text-primary-container transition-colors" href="#">Sign up</a>
</p>
</div>
</main>
</body></html>
